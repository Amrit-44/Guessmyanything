kind = "web"
previewPath = "/"
title = "Guess My Anything"
version = "1.0.0"
id = "artifacts/guess-my-anything"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25794

[services.development]
run = "pnpm --filter @workspace/guess-my-anything run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guess-my-anything", "run", "build" ]
publicDir = "artifacts/guess-my-anything/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25794"
BASE_PATH = "/"
